name: Python CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      typesense:
        image: typesense/typesense:30.2
        ports:
          - "8108:8108"
        env:
          TYPESENSE_DATA_DIR: /tmp
          TYPESENSE_API_KEY: test-api-key
          TYPESENSE_ENABLE_CORS: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Typesense
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:8108/health && break || sleep 2
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Copy README and LICENSE
        run: |
          cp README.md python/
          cp LICENSE python/
      - name: Install dependencies
        run: |
          cd python
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        env:
          TYPESENSE_API_KEY: test-api-key
        run: |
          cd python
          pytest tests/ -v

  publish:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: pip install build
      - name: Copy README and LICENSE
        run: |
          cp README.md python/
          cp LICENSE python/
      - name: Build package
        run: cd python && python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          # No password field needed for Trusted Publishing
