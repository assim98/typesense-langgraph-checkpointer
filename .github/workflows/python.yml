name: Python CI

on:
  push:
    paths:
      - "python/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/python.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      typesense:
        image: typesense/typesense:30.2
        ports:
          - "8108:8108"
        env:
          TYPESENSE_DATA_DIR: /tmp
          TYPESENSE_API_KEY: test-api-key
          TYPESENSE_ENABLE_CORS: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Typesense
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:8108/health && break || sleep 2
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd python
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          TYPESENSE_API_KEY: test-api-key
        run: |
          cd python
          pytest tests/ -v
