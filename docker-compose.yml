version: "3.8"
services:
  typesense:
    image: typesense/typesense:30.2
    ports:
      - "127.0.0.1:8108:8108"
    volumes:
      - typesense_data:/data
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-test-api-key}
    command: --data-dir /data --api-key=${TYPESENSE_API_KEY:-test-api-key} --enable-cors

volumes:
  typesense_data:
